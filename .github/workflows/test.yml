- name: Pick Next Person
        id: pick_person
        run: |
          # 1. 名簿を配列にする
          IFS=',' read -r -a MEMBERS <<< "${{ vars.MEMBER_LIST }}"
          COUNT=${#MEMBERS[@]}
          INDEX=${{ vars.CURRENT_INDEX }}
          
          # 2. 担当者を決定
          PICKED=${MEMBERS[$INDEX]}
          echo "picked=$PICKED" >> $GITHUB_OUTPUT
          
          # 3. 次のインデックスを計算
          NEXT_INDEX=$(( (INDEX + 1) % COUNT ))
          echo "next_index=$NEXT_INDEX" >> $GITHUB_OUTPUT
          echo "Current person: $PICKED, Next index: $NEXT_INDEX"

      - name: Update Current Index
        run: |
          gh api \
            --method PATCH \
            /repos/${{ github.repository }}/actions/variables/CURRENT_INDEX \
            -f value="${{ steps.pick_person.outputs.next_index }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create SubIssue
        run: |
          gh issue create \
            --title "輪番テスト：次は ${{ steps.pick_person.outputs.picked }} さんの番" \
            --body "自動アサインの実験中です。" \
            --assignee "${{ steps.pick_person.outputs.picked }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            --body "${TYPE}アップデートです。前のIssueが終わっていることを確認してから着手してください。" \
            --assignee "yaguch1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
