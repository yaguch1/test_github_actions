name: Manual Issue Creator

on:
  workflow_dispatch:

jobs:
  create_issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository # ステップ1：リポジトリの中身を読み込む
        uses: actions/checkout@v4

      - name: Create an issue # ステップ2：Issueを作る
        run: |
          gh issue create \
            --title "実験：今度こそ成功！" \
            --body "チェックアウトを覚えたので、もう怖くありません。" \
            --assignee "@me"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
