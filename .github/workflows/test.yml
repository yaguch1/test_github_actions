name: Manual Issue Creator

on:
  workflow_dispatch:

jobs:
  create_issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # リポジトリ読み込み権限
      issues: write    # Issue作成権限
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create an issue
        run: |
          gh issue create \
            --title "実験：四度目の正直（完結編）" \
            --body "ついにロボットの壁を越えました。" \
            --assignee "yaguch1"  # ここをあなたのIDに変える！
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
