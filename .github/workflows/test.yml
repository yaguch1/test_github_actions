name: Metabase Version Logic Test

on:
  workflow_dispatch:
    inputs:
      old_version:
        description: '前のバージョン'
        default: '0.45.1'
      new_version:
        description: '新しいバージョン'
        default: '0.45.2'

jobs:
  check_and_assign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pick Person (Random or Fixed)
        id: pick_person
        run: |
          # 名簿を定義
          LIST="yaguch1"  # 実験用なのであなたのIDだけでOK
          IFS=',' read -r -a MEMBERS <<< "$LIST"
          COUNT=${#MEMBERS[@]}
          
          # ランダムまたは現在時刻を使って一人選ぶ（APIを使わない工夫）
          INDEX=$(( $(date +%s) % COUNT ))
          PICKED=${MEMBERS[$INDEX]}
          
          echo "picked=$PICKED" >> $GITHUB_OUTPUT
          echo "Selected: $PICKED"

      - name: Create Issue
        run: |
          gh issue create \
            --title "実験成功：${{ steps.pick_person.outputs.picked }} さんにアサイン" \
            --body "APIの壁を越えて、ついに自動アサインが完了しました！" \
            --assignee "${{ steps.pick_person.outputs.picked }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            --body "自動アサイン成功です！" \
            --assignee "${{ steps.pick_person.outputs.picked }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
