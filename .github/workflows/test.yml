name: Metabase Version Logic Test

on:
  workflow_dispatch:
    inputs:
      old_version:
        description: '前のバージョン'
        default: '0.45.1'
        required: true
      new_version:
        description: '新しいバージョン'
        default: '0.45.2'
        required: true

jobs:
  check_and_rotate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      variables: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pick Next Person
        id: pick_person
        run: |
          # [ ] やスペースを除去して純粋なリストにする
          LIST=$(echo "${{ vars.MEMBER_LIST }}" | tr -d '[] ')
          INDEX=${{ vars.CURRENT_INDEX }}
          
          IFS=',' read -r -a MEMBERS <<< "$LIST"
          COUNT=${#MEMBERS[@]}
          
          PICKED=${MEMBERS[$INDEX]}
          NEXT_INDEX=$(( (INDEX + 1) % COUNT ))
          
          echo "picked=$PICKED" >> $GITHUB_OUTPUT
          echo "next_index=$NEXT_INDEX" >> $GITHUB_OUTPUT
          echo "Current: $PICKED (Index: $INDEX), Next Index: $NEXT_INDEX"

      - name: Update Index
        run: |
          gh api \
            --method PATCH \
            /repos/${{ github.repository }}/actions/variables/CURRENT_INDEX \
            -f value="${{ steps.pick_person.outputs.next_index }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Issue
        run: |
          gh issue create \
            --title "輪番テスト：次は ${{ steps.pick_person.outputs.picked }} さん" \
            --body "自動アサイン成功です！" \
            --assignee "${{ steps.pick_person.outputs.picked }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
