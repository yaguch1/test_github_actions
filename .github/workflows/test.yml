name: Metabase Update Automation (Standard Token)

on:
  workflow_dispatch:
    inputs:
      old_version:
        description: '現在のバージョン'
        default: '0.45.1'
        required: true
      new_version:
        description: '新しいバージョン'
        default: '0.46.0'
        required: true

jobs:
  update-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write # GraphQLの権限を広げるおまじない
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 1. Parse Version
        id: logic
        run: |
          OLD="${{ github.event.inputs.old_version }}"
          NEW="${{ github.event.inputs.new_version }}"
          if [[ "${OLD%%.*}" != "${NEW%%.*}" ]]; then
            echo "type=MAJOR" >> $GITHUB_OUTPUT
          else
            echo "type=MINOR" >> $GITHUB_OUTPUT
          fi

      - name: 2. Pick Person
        id: rotation
        run: |
          # 自分のIDを2つ並べて交互にテスト
          LIST="yaguch1,yaguch1"
          IFS=',' read -r -a MEMBERS <<< "$LIST"
          INDEX=$(cat last_index.txt 2>/dev/null || echo 0)
          if ! [[ "$INDEX" =~ ^[0-9]+$ ]]; then INDEX=0; fi
          PICKED=${MEMBERS[$INDEX]}
          NEXT_INDEX=$(( (INDEX + 1) % ${#MEMBERS[@]} ))
          echo $NEXT_INDEX > last_index.txt
          echo "picked=$PICKED" >> $GITHUB_OUTPUT

      - name: 3. Create Issue
        id: create_issue
        run: |
          TYPE="${{ steps.logic.outputs.type }}"
          OLD_V="${{ github.event.inputs.old_version }}"
          NEW_V="${{ github.event.inputs.new_version }}"
          ASSIGNEE="${{ steps.rotation.outputs.picked }}"
          PARENT_ISSUE=$(cat parent_issue_number.txt 2>/dev/null || echo "")

          TITLE="Metabase v${OLD_V} -> v${NEW_V} (${TYPE})"
          BODY="v${OLD_V} 完了後に着手。担当: @${ASSIGNEE}"

          # 作成時にアサインをせず、作成のみ実行（権限エラーを避ける工夫）
          NEW_ISSUE_URL=$(gh issue create \
            --title "$TITLE" \
            --body "$BODY")
          
          NEW_ISSUE_NUM=${NEW_ISSUE_URL##*/}
          echo "new_issue_num=$NEW_ISSUE_NUM" >> $GITHUB_OUTPUT

          # 作成した後にアサイン（失敗しても全体を止めない）
          gh issue edit $NEW_ISSUE_NUM --add-assignee "$ASSIGNEE" || echo "Assign failed but continuing"
          
          if [ "$TYPE" == "MAJOR" ]; then
            echo $NEW_ISSUE_NUM > parent_issue_number.txt
          elif [ ! -z "$PARENT_ISSUE" ]; then
            # コメントのみ。本文編集(edit)は権限が厳しいので避ける
            gh issue comment $PARENT_ISSUE --body "Sub-task: #$NEW_ISSUE_NUM" || echo "Link failed but continuing"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 4. Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_index.txt parent_issue_number.txt
          git commit -m "docs: update rotation index [skip ci]" || echo "No changes"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
