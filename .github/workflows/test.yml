name: Metabase Version Logic Test

on:
  workflow_dispatch:
    inputs:
      old_version:
        description: '前のバージョン (例: 0.45.1)'
        required: true
        default: '0.45.1'
      new_version:
        description: '新しいバージョン (例: 0.46.0)'
        required: true
        default: '0.46.0'

jobs:
  check_version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      variables: write # SettingsのVariablesを書き換えるために必要
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse Versions
        id: version_logic
        run: |
          OLD="${{ github.event.inputs.old_version }}"
          NEW="${{ github.event.inputs.new_version }}"
          
          if [[ "${OLD%%.*}" != "${NEW%%.*}" ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "${OLD%.*}" != "${NEW%.*}" ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Create SubIssue
        # ここで判定結果（type）を使って、どのタイトルでIssueを作るか決める
        run: |
          TYPE="${{ steps.version_logic.outputs.type }}"
          OLD_V="${{ github.event.inputs.old_version }}"
          NEW_V="${{ github.event.inputs.new_version }}"
          
          gh issue create \
            --title "【${TYPE^^}】v${OLD_V} -> v${NEW_V}" \
            --body "${TYPE}アップデートです。前のIssueが終わっていることを確認してから着手してください。" \
            --assignee "yaguch1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
