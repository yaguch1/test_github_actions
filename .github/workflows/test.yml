name: Manual Issue Creator
on:
  workflow_dispatch:
jobs:
  create_issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # リポジトリ読み込み権限
      issues: write    # Issue作成権限
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create an issue
        run: |
          gh issue create \
            --title "Issueのタイトル" \
            --body "Issueの本文" \
            --assignee "yaguch1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
