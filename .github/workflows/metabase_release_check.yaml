name: Metabase Release Check

on:
  schedule:
    - cron: '0 0 * * 1' # Weekly on Monday at 00:00 UTC (9:00 JST)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no issues created)'
        type: boolean
        required: false
        default: true

permissions:
  issues: write
  contents: read

jobs:
  check-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Metabase Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node .github/scripts/check_metabase_release.js --dry-run
          else
            node .github/scripts/check_metabase_release.js
          fi

